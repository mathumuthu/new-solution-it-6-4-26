<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
}

.container {
    max-width: 400px;
}

h1 {
    font-size: 100px;
    margin-bottom: 10px;
}

p {
    font-size: 18px;
    margin-bottom: 20px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: #ff4b2b;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff416c;
}
</style>
</head>

<body>

<div class="container">
    <h1>404</h1>
    <p>Oops! Page not found 😢</p>
    <button onclick="goHome()">Go Home</button>
</div>

<script>
function goHome() {
    window.location.href = "index.html"; // change your home page
}
</script>

</body>
</html>
