<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Auth</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #141e30, #243b55);
}

/* Glass Card */
.container {
    width: 350px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    color: #fff;
    animation: fadeIn 0.6s ease;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: none;
    outline: none;
}

input {
    background: rgba(255,255,255,0.2);
    color: white;
}

select {
    background: rgba(255,255,255,0.2);
    color: #fff;
}

option {
    color: black;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, #ff6a00, #ee0979);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

.links {
    text-align: center;
    margin-top: 15px;
}

.links a {
    display: block;
    margin: 5px;
    cursor: pointer;
    color: #ddd;
    font-size: 14px;
}

.links a:hover {
    color: #fff;
}

/* Hidden */
.hidden {
    display: none;
}

/* Animation */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* Mobile */
@media(max-width:500px){
    .container {
        width: 90%;
    }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="container" id="loginPage">
    <h2>Welcome Back</h2>

    <select id="role">
        <option value="">Select Role</option>
        <option value="admin">Admin</option>
        <option value="user">User</option>
    </select>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <div class="links">
        <a onclick="showPage('signupPage')">Create Account</a>
        <a onclick="showPage('forgotPage')">Forgot Password?</a>
    </div>
</div>

<!-- SIGNUP -->
<div class="container hidden" id="signupPage">
    <h2>Create Account</h2>

    <input type="text" placeholder="Full Name">
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">

    <button onclick="alert('Account Created')">Signup</button>

    <div class="links">
        <a onclick="showPage('loginPage')">Back to Login</a>
    </div>
</div>

<!-- FORGOT -->
<div class="container hidden" id="forgotPage">
    <h2>Reset Password</h2>

    <input type="email" placeholder="Enter Email">

    <button onclick="alert('Reset link sent')">Send Link</button>

    <div class="links">
        <a onclick="showPage('loginPage')">Back to Login</a>
    </div>
</div>

<script>
function showPage(page) {
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("signupPage").classList.add("hidden");
    document.getElementById("forgotPage").classList.add("hidden");

    document.getElementById(page).classList.remove("hidden");
}

function login() {
    let role = document.getElementById("role").value;
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    if(role === "" || email === "" || pass === "") {
        alert("Fill all fields");
        return;
    }

    // 🔥 Redirect logic (இத தான் நீ customize பண்ணணும்)
    if(role === "admin") {
        window.location.href = "admin.html"; // change if needed
    } else {
        window.location.href = "user.html"; // change if needed
    }
}
</script>

</body>
</html>
